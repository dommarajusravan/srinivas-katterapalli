var currentPage=1;
function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function normalisePoem(p,i){return {id:p.id||Date.now()+i,title:p.title||'',lines:Array.isArray(p.lines)?p.lines:String(p.body||'').split('\n').filter(Boolean),author:p.author||'కత్తెరపల్లి శ్రీనివాసులు రెడ్డి',date:p.date||''}}
function renderPages(){var c=document.getElementById('pages'),d=document.getElementById('dots');c.innerHTML='';d.innerHTML='';if(!Array.isArray(poems)||!poems.length){c.innerHTML='<div class="empty">కవితలు త్వరలో ఇక్కడ కనిపిస్తాయి.</div>';document.getElementById('prev-btn').disabled=true;document.getElementById('next-btn').disabled=true;return}poems=poems.map(normalisePoem);poems.forEach(function(p,i){var page=document.createElement('article');page.className='page'+(i===0?' active':'');page.id='page-'+(i+1);var lines=p.lines.map(function(l){return '<span>'+escapeHtml(l)+'</span>'}).join('');page.innerHTML='<div class="poem-card"><div class="counter">'+String(i+1).padStart(2,'0')+' / '+String(poems.length).padStart(2,'0')+'</div>'+(p.title?'<div class="ptitle">'+escapeHtml(p.title)+'</div>':'')+'<div class="divider"><span></span><span></span><span></span><span></span><span></span></div><div class="lines">'+lines+'</div><div class="meta"><div class="pauthor">— '+escapeHtml(p.author)+'</div>'+(p.date?'<div class="date">'+escapeHtml(p.date)+'</div>':'')+'</div><div class="download-wrap"><button class="download-btn" onclick="downloadPoem('+i+')">⬇ Download poem image</button></div></div>';c.appendChild(page);var dot=document.createElement('button');dot.className='dot'+(i===0?' active':'');dot.setAttribute('aria-label','Go to poem '+(i+1));dot.onclick=function(){goToPage(i+1)};d.appendChild(dot)});currentPage=1;updateNav()}
function renderTOC(){var list=document.getElementById('toc-list');list.innerHTML='';poems.forEach(function(p,i){var item=document.createElement('div');item.className='toc-item';item.innerHTML='<div class="toc-num">'+(i+1)+'</div><div class="toc-name">'+escapeHtml(p.title||'(శీర్షిక లేదు)')+'</div><div class="toc-date">'+escapeHtml(p.date||'')+'</div><button class="toc-download" type="button">Download</button>';item.onclick=function(){goToPage(i+1);showTab('read')};item.querySelector('button').onclick=function(e){e.stopPropagation();downloadPoem(i)};list.appendChild(item)})}
function goToPage(n){if(!poems.length||n<1||n>poems.length)return;var old=document.getElementById('page-'+currentPage);if(old)old.classList.remove('active');currentPage=n;var next=document.getElementById('page-'+currentPage);if(next)next.classList.add('active');document.querySelectorAll('.dot').forEach(function(dot,i){dot.classList.toggle('active',i===currentPage-1)});updateNav()}
function changePage(dir){goToPage(currentPage+dir)}
function updateNav(){document.getElementById('prev-btn').disabled=currentPage<=1;document.getElementById('next-btn').disabled=currentPage>=poems.length}
function showTab(name){document.getElementById('read-view').style.display=name==='read'?'block':'none';document.getElementById('toc-view').style.display=name==='toc'?'block':'none';document.getElementById('read-tab').classList.toggle('active',name==='read');document.getElementById('toc-tab').classList.toggle('active',name==='toc')}
function loadImage(src){return new Promise(function(resolve,reject){var img=new Image();img.onload=function(){resolve(img)};img.onerror=reject;img.src=src})}
function buildWrappedLines(ctx,text,maxWidth){var words=String(text||'').split(/\s+/).filter(Boolean),line='',out=[];for(var i=0;i<words.length;i++){var test=line?line+' '+words[i]:words[i];if(ctx.measureText(test).width>maxWidth&&line){out.push(line);line=words[i]}else{line=test}}if(line)out.push(line);return out}
function safeFileName(s){return String(s||'poem').replace(/[\\/:*?"<>|]+/g,'-').trim().slice(0,60)||'poem'}
async function drawPoemImage(p){var W=1200,H=1500,canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=W;canvas.height=H;ctx.fillStyle='#f4d99d';ctx.fillRect(0,0,W,H);try{var bg=await loadImage(window.POEM_DOWNLOAD_BG||'');ctx.drawImage(bg,0,0,W,H)}catch(e){}
ctx.save();ctx.fillStyle='rgba(255,244,210,.90)';ctx.strokeStyle='rgba(82,48,22,.22)';ctx.lineWidth=2;roundRect(ctx,70,110,610,900,26);ctx.fill();ctx.stroke();ctx.restore();ctx.fillStyle='#241307';ctx.textAlign='center';ctx.font='700 58px Tiro Telugu, serif';ctx.fillText(p.title||'కవిత',375,205);ctx.font='29px Tiro Telugu, serif';ctx.fillText('మనసున మెదిలిన భావాలు',375,260);ctx.fillText('కవితలుగా మారిన పదాలు',375,300);ctx.strokeStyle='rgba(75,42,20,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(175,338);ctx.lineTo(575,338);ctx.stroke();ctx.textAlign='left';var rawLines=(p.lines||[]).slice(0,18),fontSize=31,lineHeight=46,maxTextWidth=520,all=[];while(fontSize>=23){ctx.font=fontSize+'px Tiro Telugu, serif';lineHeight=Math.round(fontSize*1.48);all=[];rawLines.forEach(function(line){all=all.concat(buildWrappedLines(ctx,line,maxTextWidth))});if(all.length*lineHeight<=520)break;fontSize-=2}ctx.font=fontSize+'px Tiro Telugu, serif';ctx.fillStyle='#251407';var y=405;all.slice(0,Math.floor(520/lineHeight)).forEach(function(line){ctx.fillText(line,115,y);y+=lineHeight});if(all.length>Math.floor(520/lineHeight)){ctx.fillText('…',115,y)}ctx.textAlign='right';ctx.font='25px Tiro Telugu, serif';ctx.fillText('— '+(p.author||'కత్తెరపల్లి శ్రీనివాసులు రెడ్డి'),640,920);if(p.date){ctx.font='18px DM Sans, sans-serif';ctx.fillStyle='#8a5a26';ctx.fillText(p.date,640,955)}return canvas}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
async function downloadPoem(i){var p=poems[i];try{var canvas=await drawPoemImage(p);var a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=safeFileName(p.title)+'-'+(i+1)+'.png';document.body.appendChild(a);a.click();a.remove()}catch(e){alert('Download failed: '+e.message)}}
document.addEventListener('keydown',function(e){if(document.getElementById('read-view').style.display==='none')return;if(e.key==='ArrowRight')changePage(1);if(e.key==='ArrowLeft')changePage(-1)});
renderPages();renderTOC();
</script>
</body>
