<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>పద్య మాలిక – కత్తెరపల్లి శ్రీనివాసులు రెడ్డి</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu:ital@0;1&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}:root{--ink:#1c1310;--muted:#8a7060;--gold:#c9903a;--gold2:#e8b86d;--cream:#fdf8f0;--cream2:#f5ede0;--cream3:#ede0cc;--glass:rgba(255,252,247,.9);--shadow:0 24px 80px rgba(28,19,16,.18);--r:20px;--poem-download-bg:linear-gradient(#f7e8be,#b87432)}body{min-height:100vh;background:var(--cream);color:var(--ink);font-family:"DM Sans",sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 10%,rgba(201,144,58,.12),transparent 60%),radial-gradient(ellipse 60% 80% at 85% 90%,rgba(201,144,58,.08),transparent 60%);pointer-events:none}header,main{position:relative;z-index:1;max-width:980px;margin:auto}header{text-align:center;padding:4rem 1.5rem 2rem}.badge{display:inline-block;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,144,58,.25);border-radius:999px;padding:6px 18px;margin-bottom:1.25rem;background:rgba(201,144,58,.08)}.orn{display:flex;align-items:center;justify-content:center;gap:12px;margin:.5rem 0 1.25rem}.orn span:nth-child(1),.orn span:nth-child(3){height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}.orn span:nth-child(2){width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px rgba(201,144,58,.5)}h1{font-family:"Playfair Display",serif;font-size:clamp(30px,6vw,52px);line-height:1.1;margin-bottom:.6rem}.author{font-family:"Tiro Telugu",serif;color:var(--muted);font-style:italic;font-size:17px}.rule{height:1px;max-width:500px;margin:2rem auto 0;background:linear-gradient(90deg,transparent,var(--cream3),var(--gold2),var(--cream3),transparent)}main{padding:2rem 1.5rem 6rem}.tabs{display:flex;gap:5px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid rgba(201,144,58,.15);border-radius:999px;padding:5px;margin-bottom:2rem;box-shadow:0 2px 12px rgba(28,19,16,.08)}.tab{flex:1;border:0;border-radius:999px;background:transparent;color:var(--muted);padding:11px 16px;font:500 12px "DM Sans",sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 4px 14px rgba(201,144,58,.35)}.book{position:relative;overflow:hidden;background:var(--glass);border:1px solid rgba(255,255,255,.9);border-radius:var(--r);box-shadow:var(--shadow),inset 0 1px 0 #fff}.book:before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),var(--gold),var(--gold2),transparent);z-index:3}.poem-scene{position:relative;background-image:var(--poem-download-bg);background-size:cover;background-position:center;min-height:680px}.poem-scene:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,248,226,.18),rgba(255,248,226,.03) 45%,rgba(255,248,226,.00));pointer-events:none}.page{position:relative;z-index:1;display:none;min-height:680px;padding:3.5rem 3rem 2.5rem;flex-direction:column;justify-content:space-between;animation:fade .35s ease}.page.active{display:flex}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}.poem-card{max-width:560px;background:rgba(255,242,204,.88);border:1px solid rgba(109,65,28,.20);border-radius:22px;padding:2rem 2.1rem;box-shadow:0 16px 45px rgba(49,28,14,.16);backdrop-filter:blur(1px)}.counter{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.35rem;color:var(--gold);font-size:10px;letter-spacing:.2em;text-transform:uppercase}.counter:before,.counter:after{content:"";height:1px;width:42px;background:linear-gradient(90deg,transparent,var(--cream3))}.counter:after{background:linear-gradient(90deg,var(--cream3),transparent)}.ptitle{font-family:"Playfair Display",serif;font-style:italic;text-align:center;font-size:clamp(20px,3vw,29px);margin-bottom:1.4rem}.divider{display:flex;justify-content:center;gap:8px;margin-bottom:1.8rem}.divider span{width:4px;height:4px;border-radius:50%;background:var(--gold2)}.divider span:first-child,.divider span:last-child{opacity:.45}.lines{font-family:"Tiro Telugu",serif;text-align:center;font-size:clamp(19px,2.8vw,25px);line-height:2.15}.lines span{display:block}.meta{margin-top:1.8rem;padding-top:1.2rem;border-top:1px solid rgba(201,144,58,.16);text-align:right}.meta .pauthor{font-family:"Tiro Telugu",serif;color:var(--muted);font-style:italic;font-size:14px}.meta .date{font-size:11px;color:var(--gold);letter-spacing:.08em;margin-top:3px}.download-wrap{text-align:center;margin-top:1.4rem}.download-btn{border:1px solid rgba(201,144,58,.28);border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:white;padding:9px 18px;font:500 12px "DM Sans",sans-serif;letter-spacing:.06em;cursor:pointer;box-shadow:0 4px 14px rgba(201,144,58,.28)}.download-btn:hover{opacity:.9}.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;border-top:1px solid rgba(201,144,58,.1);background:linear-gradient(to bottom,transparent,rgba(245,237,224,.45))}.nav button{font-family:"DM Sans",sans-serif;cursor:pointer}.nav-btn{background:none;border:1px solid rgba(201,144,58,.25);border-radius:999px;color:#4a3728;padding:8px 20px;font-size:12px;font-weight:500}.nav-btn:hover:not(:disabled){background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;color:#fff}.nav-btn:disabled{opacity:.25;cursor:default}.dots{display:flex;align-items:center;gap:6px}.dot{width:6px;height:6px;border:0;border-radius:50%;background:var(--cream3);padding:0}.dot.active{width:18px;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}.toc{padding:2rem 2.5rem}.toc h2{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem}.toc-item{display:flex;align-items:center;gap:16px;padding:14px 8px;border-bottom:1px solid rgba(201,144,58,.08);cursor:pointer;border-radius:8px}.toc-item:hover{background:rgba(201,144,58,.06);padding-left:14px}.toc-num{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,var(--cream2),var(--cream3));border:1px solid rgba(201,144,58,.2);font-size:11px;color:var(--gold);flex-shrink:0}.toc-name{font-family:"Tiro Telugu",serif;font-size:18px;flex:1}.toc-date{font-size:11px;color:var(--muted)}.toc-download{border:1px solid rgba(201,144,58,.25);border-radius:999px;background:rgba(255,255,255,.55);color:var(--gold);font:500 11px "DM Sans",sans-serif;padding:6px 10px;cursor:pointer}.empty{text-align:center;padding:3rem;font-family:"Tiro Telugu",serif;color:var(--muted)}@media(max-width:600px){header{padding-top:3rem}.poem-scene,.page{min-height:620px}.page{padding:2rem 1.2rem}.poem-card{padding:1.5rem 1.2rem}.nav{padding:1rem 1.2rem}.toc{padding:1.5rem}.toc-item{gap:10px;flex-wrap:wrap}.toc-download{width:100%}}
</style>
</head>
<body>
<header><div class="badge">కవిత్వ సంకలనం</div><div class="orn"><span></span><span></span><span></span></div><h1>పద్య మాలిక</h1><div class="author">కత్తెరపల్లి శ్రీనివాసులు రెడ్డి</div><div class="rule"></div></header>
<main>
  <div class="tabs" role="tablist" aria-label="Poem navigation"><button class="tab active" id="read-tab" onclick="showTab('read')">చదవు</button><button class="tab" id="toc-tab" onclick="showTab('toc')">విషయ సూచిక</button></div>
  <section id="read-view"><div class="book"><div class="poem-scene"><div id="pages"></div></div><div class="nav"><button class="nav-btn" id="prev-btn" onclick="changePage(-1)">← వెనుక</button><div class="dots" id="dots"></div><button class="nav-btn" id="next-btn" onclick="changePage(1)">ముందు →</button></div></div></section>
  <section id="toc-view" style="display:none"><div class="book"><div class="toc"><h2>అన్ని కవితలు</h2><div id="toc-list"></div></div></div></section>
</main>
<script src="assets/poem-bg.js"></script>
<script>
var poems = [{"id":1,"title":"నరసింహ స్తుతి","lines":["చతుర్దావతార పురుషుడు","నర సింహ స్వరూపుడు","భక్తప్రహ్లాద వరదుడు","భవబంధన విముక్తుడు","సర్వలోక పాలకుడు","సాధుజన రక్షకునికి","జయము జయము ...."],"author":"కత్తెరపల్లి శ్రీనివాసులు రెడ్డి","date":"30 ఏప్రిల్ 2026"},{"id":1779738522769,"title":"ఆరంభం","lines":["ప్రోత్సాహపు స్పూర్తి మీది","ఉత్సాహము నింపిన మాట మీది","మనసునెక్కడో దాగిన","మాటల ప్రవాహాన్ని","మన భాషలో రాసుకొనే","భాగ్యము నాది...","... మిత్రులందరికీ ధన్యవాదములతో",".. కత్తెరపల్లి శ్రీనివాసులు రెడ్డి"],"author":"కత్తెరపల్లి శ్రీనివాసులు రెడ్డి","date":"25 మే 2026"}]; // @@POEMSMARK@@
var currentPage=1;
function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function normalisePoem(p,i){return {id:p.id||Date.now()+i,title:p.title||'',lines:Array.isArray(p.lines)?p.lines:String(p.body||'').split('\n').filter(Boolean),author:p.author||'కత్తెరపల్లి శ్రీనివాసులు రెడ్డి',date:p.date||''}}
function renderPages(){var c=document.getElementById('pages'),d=document.getElementById('dots');c.innerHTML='';d.innerHTML='';if(!Array.isArray(poems)||!poems.length){c.innerHTML='<div class="empty">కవితలు త్వరలో ఇక్కడ కనిపిస్తాయి.</div>';document.getElementById('prev-btn').disabled=true;document.getElementById('next-btn').disabled=true;return}poems=poems.map(normalisePoem);poems.forEach(function(p,i){var page=document.createElement('article');page.className='page'+(i===0?' active':'');page.id='page-'+(i+1);var lines=p.lines.map(function(l){return '<span>'+escapeHtml(l)+'</span>'}).join('');page.innerHTML='<div class="poem-card"><div class="counter">'+String(i+1).padStart(2,'0')+' / '+String(poems.length).padStart(2,'0')+'</div>'+(p.title?'<div class="ptitle">'+escapeHtml(p.title)+'</div>':'')+'<div class="divider"><span></span><span></span><span></span><span></span><span></span></div><div class="lines">'+lines+'</div><div class="meta"><div class="pauthor">— '+escapeHtml(p.author)+'</div>'+(p.date?'<div class="date">'+escapeHtml(p.date)+'</div>':'')+'</div><div class="download-wrap"><button class="download-btn" onclick="downloadPoem('+i+')">⬇ Download poem image</button></div></div>';c.appendChild(page);var dot=document.createElement('button');dot.className='dot'+(i===0?' active':'');dot.setAttribute('aria-label','Go to poem '+(i+1));dot.onclick=function(){goToPage(i+1)};d.appendChild(dot)});currentPage=1;updateNav()}
function renderTOC(){var list=document.getElementById('toc-list');list.innerHTML='';poems.forEach(function(p,i){var item=document.createElement('div');item.className='toc-item';item.innerHTML='<div class="toc-num">'+(i+1)+'</div><div class="toc-name">'+escapeHtml(p.title||'(శీర్షిక లేదు)')+'</div><div class="toc-date">'+escapeHtml(p.date||'')+'</div><button class="toc-download" type="button">Download</button>';item.onclick=function(){goToPage(i+1);showTab('read')};item.querySelector('button').onclick=function(e){e.stopPropagation();downloadPoem(i)};list.appendChild(item)})}
function goToPage(n){if(!poems.length||n<1||n>poems.length)return;var old=document.getElementById('page-'+currentPage);if(old)old.classList.remove('active');currentPage=n;var next=document.getElementById('page-'+currentPage);if(next)next.classList.add('active');document.querySelectorAll('.dot').forEach(function(dot,i){dot.classList.toggle('active',i===currentPage-1)});updateNav()}
function changePage(dir){goToPage(currentPage+dir)}
function updateNav(){document.getElementById('prev-btn').disabled=currentPage<=1;document.getElementById('next-btn').disabled=currentPage>=poems.length}
function showTab(name){document.getElementById('read-view').style.display=name==='read'?'block':'none';document.getElementById('toc-view').style.display=name==='toc'?'block':'none';document.getElementById('read-tab').classList.toggle('active',name==='read');document.getElementById('toc-tab').classList.toggle('active',name==='toc')}
function loadImage(src){return new Promise(function(resolve,reject){var img=new Image();img.onload=function(){resolve(img)};img.onerror=reject;img.src=src})}
function buildWrappedLines(ctx,text,maxWidth){var words=String(text||'').split(/\s+/).filter(Boolean),line='',out=[];for(var i=0;i<words.length;i++){var test=line?line+' '+words[i]:words[i];if(ctx.measureText(test).width>maxWidth&&line){out.push(line);line=words[i]}else{line=test}}if(line)out.push(line);return out}
function safeFileName(s){return String(s||'poem').replace(/[\\/:*?"<>|]+/g,'-').trim().slice(0,60)||'poem'}
async function drawPoemImage(p){var W=1200,H=1500,canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=W;canvas.height=H;ctx.fillStyle='#f4d99d';ctx.fillRect(0,0,W,H);try{var bg=await loadImage(window.POEM_DOWNLOAD_BG||'');ctx.drawImage(bg,0,0,W,H)}catch(e){}
ctx.save();ctx.fillStyle='rgba(255,244,210,.90)';ctx.strokeStyle='rgba(82,48,22,.22)';ctx.lineWidth=2;roundRect(ctx,70,110,610,900,26);ctx.fill();ctx.stroke();ctx.restore();ctx.fillStyle='#241307';ctx.textAlign='center';ctx.font='700 58px Tiro Telugu, serif';ctx.fillText(p.title||'కవిత',375,205);ctx.font='29px Tiro Telugu, serif';ctx.fillText('మనసున మెదిలిన భావాలు',375,260);ctx.fillText('కవితలుగా మారిన పదాలు',375,300);ctx.strokeStyle='rgba(75,42,20,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(175,338);ctx.lineTo(575,338);ctx.stroke();ctx.textAlign='left';var rawLines=(p.lines||[]).slice(0,18),fontSize=31,lineHeight=46,maxTextWidth=520,all=[];while(fontSize>=23){ctx.font=fontSize+'px Tiro Telugu, serif';lineHeight=Math.round(fontSize*1.48);all=[];rawLines.forEach(function(line){all=all.concat(buildWrappedLines(ctx,line,maxTextWidth))});if(all.length*lineHeight<=520)break;fontSize-=2}ctx.font=fontSize+'px Tiro Telugu, serif';ctx.fillStyle='#251407';var y=405;all.slice(0,Math.floor(520/lineHeight)).forEach(function(line){ctx.fillText(line,115,y);y+=lineHeight});if(all.length>Math.floor(520/lineHeight)){ctx.fillText('…',115,y)}ctx.textAlign='right';ctx.font='25px Tiro Telugu, serif';ctx.fillText('— '+(p.author||'కత్తెరపల్లి శ్రీనివాసులు రెడ్డి'),640,920);if(p.date){ctx.font='18px DM Sans, sans-serif';ctx.fillStyle='#8a5a26';ctx.fillText(p.date,640,955)}return canvas}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
async function downloadPoem(i){var p=poems[i];try{var canvas=await drawPoemImage(p);var a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=safeFileName(p.title)+'-'+(i+1)+'.png';document.body.appendChild(a);a.click();a.remove()}catch(e){alert('Download failed: '+e.message)}}
document.addEventListener('keydown',function(e){if(document.getElementById('read-view').style.display==='none')return;if(e.key==='ArrowRight')changePage(1);if(e.key==='ArrowLeft')changePage(-1)});
renderPages();renderTOC();
</script>
</body>
</html>
